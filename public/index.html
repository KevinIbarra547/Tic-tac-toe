<!DOCTYPE html>
<html>
  <head>
    <title>Tic Tac Toe AI</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>Tic Tac Toe AI</h1>
    <nav>
      <a href="/">Home</a>
      <a href="/leaderboard.html">Leaderboard</a>
      <a href="/checkpoints.html">Checkpoints</a>
    </nav>
    <p id="status">Loading...</p>

    <div id="auth-forms">
      <form id="signup-form">
        <h2>Sign Up</h2>
        <input type="text" id="signup-username" placeholder="Username" required>
        <input type="password" id="signup-password" placeholder="Password" required>
        <button type="submit">Sign Up</button>
      </form>

      <form id="login-form">
        <h2>Log In</h2>
        <input type="text" id="login-username" placeholder="Username" required>
        <input type="password" id="login-password" placeholder="Password" required>
        <button type="submit">Log In</button>
      </form>
    </div>

    <button id="logout-button" style="display:none">Log Out</button>

    <div id="game" style="display:none">
      <h2>Game</h2>

      <div id="game-settings" class="pvp-mode">
        <p class="label">Game settings</p>
        <div class="row">
          <label id="mode-row">
            Mode
            <div id="mode-toggle">
              <button id="mode-pvp" class="active" data-mode="pvp">vs Human</button>
              <button id="mode-pvai" data-mode="pvai">vs AI</button>
            </div>
          </label>
          <label id="letter-row">
            Play as
            <select id="player-letter">
              <option value="X" selected>X (go first)</option>
              <option value="O">O (go second)</option>
            </select>
          </label>
          <label id="difficulty-row">
            Difficulty
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium" selected>Medium</option>
              <option value="hard">Hard</option>
            </select>
          </label>
          <label id="personality-row">
            Personality
            <select id="personality">
              <option value="pirate">Pirate</option>
              <option value="wizard" selected>Wizard</option>
              <option value="robot">Robot</option>
            </select>
          </label>
        </div>
      </div>

      <p id="turn-indicator">Current turn: X</p>
      <p id="ai-thinking" style="display:none">AI is thinking</p>
      <div id="board">
        <button class="cell" data-index="0"></button>
        <button class="cell" data-index="1"></button>
        <button class="cell" data-index="2"></button>
        <button class="cell" data-index="3"></button>
        <button class="cell" data-index="4"></button>
        <button class="cell" data-index="5"></button>
        <button class="cell" data-index="6"></button>
        <button class="cell" data-index="7"></button>
        <button class="cell" data-index="8"></button>
      </div>
      <div id="ai-comment" style="display:none"></div>
      <button id="new-game-button" class="primary">New game</button>
      <div id="history">
        <h3>Your game history</h3>
        <ul id="history-list"></ul>
      </div>
    </div>

    <div id="replay-modal">
      <div id="replay-modal-content">
        <button id="replay-close" aria-label="Close">&#x2715;</button>
        <h2>Game replay</h2>
        <p id="replay-meta"></p>
        <div id="replay-board"></div>
        <p id="replay-counter"></p>
        <div id="replay-controls">
          <button id="replay-prev">&#8592; Prev</button>
          <button id="replay-auto">Auto-play</button>
          <button id="replay-next">Next &#8594;</button>
        </div>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
